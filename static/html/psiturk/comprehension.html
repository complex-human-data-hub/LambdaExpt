<div style="margin: 2em auto; max-width: 800px;">
    <div style="text-align: center;">
        <h3>Comprehension Questions</h3>
    </div>

    <div class="exp-document-container" style="margin: auto;">
        <p>Please answer the following questions about the document you just read.</p>

        <!-- task.js renders each question + its radio options into #questions
             at runtime, then reads selected values when .continue is clicked. -->
        <div id="questions"></div>
    </div>

    <div class="instructionsnav" style="text-align: center; margin-top: 2em;">
        <button type="button" class="continue">Continue</button>
    </div>
</div>
